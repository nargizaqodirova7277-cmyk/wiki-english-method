<head>

    <title>Wiki-English-Method</title>
    <style>
        /* Ilova dizayni (CSS) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; padding: 25px 20px; text-align: center; }
        .header h1 { font-size: 24px; color: #1a202c; margin: 0 0 8px; }
        .header p { color: #4a5568; font-size: 13px; line-height: 1.5; margin: 0 0 15px; }
        .badge { display: inline-block; background: #e2e8f0; color: #4a5568; padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Tugmalar dizayni */
        .menu-btn { display: flex; align-items: center; justify-content: center; background: #3182ce; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: bold; margin-bottom: 12px; font-size: 14px; transition: 0.2s; box-shadow: 0 4px 6px rgba(49, 130, 206, 0.2); }
        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(49, 130, 206, 0.3); }
        .btn-orange { background: #ed8936; box-shadow: 0 4px 6px rgba(237, 137, 54, 0.2); }
        .btn-orange:hover { box-shadow: 0 6px 12px rgba(237, 137, 54, 0.3); }
        .btn-green { background: #38a169; box-shadow: 0 4px 6px rgba(56, 161, 105, 0.2); }
        .btn-green:hover { box-shadow: 0 6px 12px rgba(56, 161, 105, 0.3); }
        
        /* Ovoz va Qoidalar bloki */
        .audio-box { text-align: left; background: #f7fafc; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid #e2e8f0; }
        .rules-box { text-align: left; background: #fffaf0; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 12px; color: #744210; border: 1px solid #fbd38d; line-height: 1.6; }
        .footer { margin-top: 25px; font-size: 11px; color: #a0aec0; }
    </style>
</head>
