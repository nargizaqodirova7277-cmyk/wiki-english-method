<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki-English-Method App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-box { background: white; width: 100%; max-width: 380px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px 20px; text-align: center; box-sizing: border-box; }
        .header h1 { font-size: 26px; color: #2d3748; margin: 0 0 10px; }
        .header p { color: #718096; font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
        .badge { background: #e2e8f0; color: #4a5568; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 25px; display: inline-block; }
        
        .btn { display: block; background: #3182ce; color: white; text-decoration: none; padding: 16px; border-radius: 14px; font-weight: bold; margin-bottom: 12px; font-size: 15px; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 6px rgba(49,130,206,0.2); }
        .btn:hover { transform: translateY(-3px); background: #2b6cb0; }
        .btn-green { background: #38a169; box-shadow: 0 4px 6px rgba(56,161,105,0.2); }
        .btn-green:hover { background: #2f855a; }
        
        .audio-section { background: #edf2f7; padding: 15px; border-radius: 14px; margin-top: 20px; text-align: left; }
        .audio-title { font-weight: bold; color: #2d3748; font-size: 14px; margin: 0 0 5px; }
        .audio-subtitle { font-size: 12px; color: #718096; margin: 0 0 10px; }
        audio { width: 100%; height: 40px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <div class="app-box">
        <div class="header">
            <h1>🌐 Wiki-English</h1>
            <p>Interactive English Learning for Software Engineers</p>
            <div class="badge">Lesson 1: IT Skills</div>
        </div>

        <a href="https://github.com/nargizaqodirova7277-cmyk/wiki-english-method/wiki/Importance-of-IT-Skills-in-Software-Engineering" class="btn">🚀 Start Lesson 1</a>
        <a href="https://github.com/nargizaqodirova7277-cmyk/wiki-english-method/wiki" class="btn btn-green">📚 Open Wiki Workspace</a>

        <div class="audio-section">
            <p class="audio-title">🎧 IT Vocabulary Audio</p>
            <p class="audio-subtitle">Listen and repeat: Technology, Software, Innovation</p>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Sizning brauzeringiz audioni qo'llab-quvvatlamaydi.
            </audio>
        </div>
    </div>

</body>
</html>
